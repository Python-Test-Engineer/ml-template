<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Data Science Detective Agency</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .poster {
    width: 340px;
    height: 510px;
    background: linear-gradient(160deg, #1A1A2E 0%, #16213E 55%, #0F3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 40px 30px 30px;
    position: relative;
    overflow: hidden;

    /* start tiny, invisible */
    opacity: 0;
    transform-origin: center center;
    animation:
      card-appear  0.4s ease-out  0.3s forwards,
      card-expand  2.8s ease-in-out 0.7s forwards,
      page-fadeout 0.7s ease-in   3.8s forwards;
  }

  /* decorative top stripe */
  .poster::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #F0C040, #E67E22, #C0392B, #8E44AD);
  }

  @keyframes card-appear {
    from { opacity: 0; transform: scale(0.13); border-radius: 24px; }
    to   { opacity: 1; transform: scale(0.13); border-radius: 24px; }
  }

  @keyframes card-expand {
    0%   { transform: scale(0.13); border-radius: 24px; }
    100% { transform: scale(3.2);  border-radius: 4px;  }
  }

  @keyframes page-fadeout {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* ── Magnifying glass icon (SVG inline) ── */
  .icon-wrap {
    margin-bottom: 8px;
  }
  .icon-wrap svg {
    width: 64px; height: 64px;
    filter: drop-shadow(0 0 12px rgba(240,192,64,0.5));
  }

  /* ── Studio label ── */
  .studio {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: #F0C040;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 6px;
  }

  /* ── Main title ── */
  .title {
    font-family: 'Georgia', serif;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    line-height: 1.15;
    color: #F0C040;
    text-shadow: 0 0 20px rgba(240,192,64,0.4), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Tagline ── */
  .tagline {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.08em;
    text-align: center;
    font-style: italic;
    margin-top: 10px;
  }

  /* ── Divider ── */
  .divider {
    width: 80%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #F0C04066, transparent);
    margin: 10px 0;
  }

  /* ── Agents row ── */
  .agents {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .agent-chip {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    color: #ccc;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    padding: 3px 7px;
    letter-spacing: 0.05em;
  }

  /* ── Bottom section ── */
  .bottom {
    width: 100%;
    text-align: center;
  }
  .lesson-label {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.4em;
    color: #F0C040;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4px;
  }
  .lesson-title {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #ccc;
    margin-bottom: 14px;
  }
  .rating-bar {
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #4A90D9, #8E44AD, #C0392B);
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="poster">
  <!-- Magnifying glass SVG -->
  <div class="icon-wrap">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="17" stroke="#F0C040" stroke-width="4"/>
      <line x1="38" y1="38" x2="56" y2="56" stroke="#F0C040" stroke-width="5" stroke-linecap="round"/>
      <circle cx="22" cy="22" r="7" fill="rgba(240,192,64,0.12)"/>
    </svg>
  </div>

  <div class="studio">Data Intelligence Researcher</div>

  <div class="title">The Data Science<br>Detective Agency</div>

  <div class="tagline">"Every dataset hides a secret"</div>

  <div class="divider"></div>

  <div class="agents">
    <span class="agent-chip">Manager</span>
    <span class="agent-chip">DataCleaner</span>
    <span class="agent-chip">Statistician</span>
    <span class="agent-chip">Visualizer</span>
    <span class="agent-chip">Reporter</span>
  </div>

  <div class="divider"></div>

  <div class="bottom">
    <div class="lesson-label">Lesson 01</div>
    <div class="lesson-title">Multi-Agent Collaboration</div>
    <div class="rating-bar"></div>
  </div>
</div>

<script>
  // After the full animation sequence, redirect to the Shiny app
  // Total: 0.3 (delay) + 0.4 (appear) + 2.8 (expand) + 0.7 (fade) = 4.2 s
  setTimeout(function () {
    window.location.href = 'http://127.0.0.1:8000/?autostart=1';
  }, 4400);
</script>
</body>
</html>
